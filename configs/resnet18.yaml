seed: 42
data:
  root: data/raw/EuroSAT
  num_classes: 10
  image_size: 224
  batch_size: 32
  num_workers: 4
model:
  name: resnet18
  pretrained: true
  freeze_backbone: false
train:
  epochs: 15
  lr: 0.0003
  weight_decay: 0.0001
  optimizer: adamw
  scheduler: cosine
eval:
  metrics:
    - accuracy
    - f1_macro
