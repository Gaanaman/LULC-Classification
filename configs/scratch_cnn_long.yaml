seed: 42
run_name: scratch_cnn_long
data:
  root: data/raw/EuroSAT
  num_classes: 10
  image_size: 64
  batch_size: 64
  num_workers: 4
model:
  name: scratch_cnn
  pretrained: false
train:
  epochs: 40
  lr: 0.001
  weight_decay: 0.0001
  optimizer: adamw
  scheduler: cosine
eval:
  metrics:
    - accuracy
    - f1_macro
