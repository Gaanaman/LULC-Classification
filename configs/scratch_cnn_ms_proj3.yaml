seed: 42
run_name: scratch_cnn_ms_proj3
data:
  bands: multispectral
  root_ms: data/raw/EuroSATMS
  band_subset: all
  drop_cirrus: true
  add_indices: false
  num_classes: 10
  image_size: 64
  batch_size: 64
  num_workers: 4
model:
  name: scratch_cnn
  spectral_channels: 3
  pretrained: false
  channels: [64, 128, 256, 512]
train:
  epochs: 40
  lr: 0.001
  weight_decay: 0.0001
  optimizer: adamw
  scheduler: cosine
eval:
  metrics:
    - accuracy
    - f1_macro
