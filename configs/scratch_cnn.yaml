seed: 42
data:
  root: data/raw/EuroSAT
  num_classes: 10
  image_size: 64
  batch_size: 64
  num_workers: 4
model:
  name: scratch_cnn
  pretrained: false
train:
  epochs: 25
  lr: 0.001
  weight_decay: 0.0001
  optimizer: adam
  scheduler: step
  step_size: 10
  gamma: 0.1
eval:
  metrics:
    - accuracy
    - f1_macro
