seed: 42
run_name: scratch_cnn_s_distill
data:
  root: data/raw/EuroSAT
  num_classes: 10
  image_size: 64
  batch_size: 64
  num_workers: 4
model:
  name: scratch_cnn
  pretrained: false
  channels: [32, 64, 128, 256]
distill:
  teacher_name: efficientnet_v2_s
  teacher_ckpt: outputs/checkpoints/efficientnet_v2_s/best_model.pth
  teacher_image_size: 224
  temperature: 4.0
  alpha: 0.7
train:
  epochs: 40
  lr: 0.001
  weight_decay: 0.0001
  optimizer: adamw
  scheduler: cosine
eval:
  metrics:
    - accuracy
    - f1_macro
